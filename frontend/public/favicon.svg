<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="coffeeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:1" /> <!-- Saddle Brown -->
      <stop offset="100%" style="stop-color:#3E2723;stop-opacity:1" /> <!-- Deep Coffee -->
    </linearGradient>
  </defs>
  
  <!-- Warm Brown Background -->
  <rect width="100" height="100" rx="25" fill="url(#coffeeGrad)" />
  
  <!-- Pretty Coffee Bean -->
  <g transform="translate(50, 50) rotate(-30)">
    <!-- Main Body -->
    <ellipse cx="0" cy="0" rx="30" ry="40" fill="#F5F5DC" opacity="0.9" />
    <!-- S-Curve in the middle -->
    <path d="M-5,-40 Q10,0 -5,40" stroke="#8B4513" stroke-width="6" fill="none" stroke-linecap="round" />
  </g>
  
  <!-- Subtle Glow/Shine -->
  <circle cx="35" cy="35" r="5" fill="white" opacity="0.3" />
</svg>