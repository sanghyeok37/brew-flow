name: BrewFlow CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build Backend
        run: |
          cd backend
          chmod +x gradlew
          ./gradlew clean bootJar -x test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/brewflow-backend:latest

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_BASE_URL=/
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/brewflow-frontend:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/brew-flow/initdb
            # schema.sql 전송 (간소화를 위해 echo/cat 사용 또는 scp-action 추천)
            # 여기서는 프로젝트 루트의 docker-compose.yml과 schema.sql을 활용하도록 구성
            
      - name: Copy Files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml,backend/src/main/resources/db/*.sql"
          target: "~/brew-flow"
          strip_components: 0

      - name: Execute Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/brew-flow
            mkdir -p initdb
            
            # SQL 파일 순서대로 배치 (알파벳 순 실행 보장)
            cp backend/src/main/resources/db/schema_drop.sql initdb/01_schema_drop.sql || true
            cp backend/src/main/resources/db/schema.sql initdb/02_schema.sql || true
            cp backend/src/main/resources/db/brew-flow-demo-data.sql initdb/03_demo_data.sql || true
            
            # .env 파일 생성
            cat <<EOF > .env
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            MYSQL_DATABASE=brew_flow
            MYSQL_USER=brewflow
            MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
            SMTP_HOST=smtp.gmail.com
            SMTP_PORT=587
            SMTP_USERNAME=${{ secrets.SMTP_USERNAME }}
            SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
            EOF
            
            docker-compose pull
            docker-compose up -d
            docker image prune -f

